services:
  db:
    image: postgres:16
    container_name: journalize-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: journalize
      POSTGRES_USER: journalize
      POSTGRES_PASSWORD: journalize
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: