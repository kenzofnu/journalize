# Production config. Activated with SPRING_PROFILES_ACTIVE=prod.
# Contains NO secrets — every value comes from an environment variable injected
# by the hosting platform (e.g. Render). Safe to commit.
spring.application.name=journalize

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Hosting platforms assign the port via the PORT env var
server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

gemini.api.key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.embedding-model=${GEMINI_EMBEDDING_MODEL:text-embedding-004}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
